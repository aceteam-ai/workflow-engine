# Example wengine config. Copy to the path printed by `wengine config path`
# (typically ~/.config/wengine/config.yaml) and edit to taste.
#
# Each entry maps a short alias (used in workflows) to a fully-qualified
# Python class. The engine refuses to import anything not listed here, so
# this file doubles as an allow-list.

nodes:
  # Required for any non-trivial workflow:
  Input:  workflow_engine.core.io.InputNode
  Output: workflow_engine.core.io.OutputNode

  # Built-in nodes from aceteam-workflow-engine:
  Sum:                workflow_engine.nodes.arithmetic.SumNode
  Add:                workflow_engine.nodes.arithmetic.AddNode
  Factorize:          workflow_engine.nodes.arithmetic.FactorizationNode
  ConstantInteger:    workflow_engine.nodes.constant.ConstantIntegerNode
  ConstantString:     workflow_engine.nodes.constant.ConstantStringNode
  ConstantBoolean:    workflow_engine.nodes.constant.ConstantBooleanNode
  If:                 workflow_engine.nodes.conditional.IfNode
  IfElse:             workflow_engine.nodes.conditional.IfElseNode
  ExpandData:         workflow_engine.nodes.data.ExpandDataNode
  ExpandSequence:     workflow_engine.nodes.data.ExpandSequenceNode
  ExpandMapping:      workflow_engine.nodes.data.ExpandMappingNode

  # Add nodes from other packages by their fully-qualified class path, e.g.:
  # BrowserFetch: aceteam_nodes.nodes.browser_fetch.BrowserFetchNode
  # APICall:      aceteam_nodes.nodes.api_call.APICallNode
  # LLM:          aceteam_nodes.nodes.llm.LLMNode
