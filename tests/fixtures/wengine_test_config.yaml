# Shared wengine CLI test engine.yaml — only built-in I/O + arithmetic nodes.
#
# tests/test_cli.py's autouse `engine_project` fixture copies this into a temp dir
# and chdirs there, so the CLI's walk-up discovery resolves a stable node map.
# Without it, pytest would pick up whatever engine.yaml lives above the cwd, so
# tests would not be reproducible across machines or CI.
schema_version: 1
nodes:
  Input: aceteam-workflow-engine:Input
  Output: aceteam-workflow-engine:Output
  Sum: aceteam-workflow-engine:Sum
